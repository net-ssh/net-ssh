openssl_conf = openssl_init

[openssl_init]
ssl_conf = ssl_sect
providers = provider_sect
alg_section = evp_properties

[evp_properties]
# Required on RHEL/Fedora patched OpenSSL builds (3.x) to permit SHA-1 for
# RSA/DSA signing, which is blocked by default even with the legacy provider.
rh-allow-sha1-signatures = yes

[provider_sect]
default = default_sect
legacy = legacy_sect

[default_sect]
activate = 1

[legacy_sect]
activate = 1

[ssl_sect]
system_default = system_default_sect

[system_default_sect]
CipherString = DEFAULT@SECLEVEL=0
# system_default = system_default_sect
# 
# [system_default_sect]
# Options = UnsafeLegacyRenegotiation
